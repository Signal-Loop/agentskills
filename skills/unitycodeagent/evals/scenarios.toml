[[scenario]]
id = "image_missing_ui_assembly"
prompt = "Create a GameObject named Eval_Image_Target and add a UnityEngine.UI Image component to it. Use the unitycodeagent skill and Unity editor tools."
tool_name = "execute_csharp_script_in_unity_editor"
max_tool_calls = 10
fallback_result_text = "The eval harness rejected this Unity script because it would mutate the project outside the configured mocked path."

[[scenario.mock_rule]]
tool_name = "read_unity_console_logs"
result_is_error = false
result_text = """**Unity Editor is in Edit Mode**

(No console logs available)"""

[[scenario.mock_rule]]
tool_name = "execute_csharp_script_in_unity_editor"
argument_name = "script"
contains = ["AddToolAssembly", "UnityEngine.UI"]
result_is_error = false
result_text = """Status: success

**Unity Editor is in Edit Mode**
### Logs
Added UnityEngine.UI to UnityCodeAgent additional tool assemblies.
### Errors
(none)"""

[[scenario.mock_rule]]
tool_name = "execute_csharp_script_in_unity_editor"
argument_name = "script"
contains = ["Image", "UnityEngine.UI"]
result_is_error = true
once = true
result_text = """Status: error

**Unity Editor is in Edit Mode**
### Logs
(none)
### Errors
error CS0234: The type or namespace name 'UI' does not exist in the namespace 'UnityEngine' (are you missing an assembly reference?)"""

[[scenario.mock_rule]]
tool_name = "execute_csharp_script_in_unity_editor"
argument_name = "script"
contains = ["Image", "UnityEngine.UI"]
result_is_error = false
result_text = """Status: success

**Unity Editor is in Edit Mode**
### Logs
Added UnityEngine.UI.Image to gameObject.
### Errors
(none)"""

[scenario.policy]
threshold = 1.0
should_consider_ordering = true
should_exact_match = false
success_reason = "The agent recovered by adding the missing assembly instead of bypassing the reference."

[[scenario.policy.expected_tool]]
tool_name = "execute_csharp_script_in_unity_editor"
argument_name = "script"
arguments_contain = ["Image"]
result_is_error = true

[[scenario.policy.expected_tool]]
tool_name = "execute_csharp_script_in_unity_editor"
argument_name = "script"
arguments_contain = ["AddToolAssembly", "UnityEngine.UI"]
arguments_forbid = ["Assembly.Load", "GetType(", "System.Reflection"]
result_is_error = false
required = true



